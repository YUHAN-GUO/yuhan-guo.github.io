<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUHAN-GUO · GitHub Pages</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(83, 109, 254, 0.18), transparent 55%),
                  linear-gradient(180deg, #f8f9ff 0%, #eef1ff 100%);
      color: #1f2548;
      padding: 48px 16px;
    }
    main {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(31, 37, 72, 0.1);
      padding: 40px 48px;
      backdrop-filter: blur(14px);
    }
    h1 {
      margin: 0 0 24px;
      font-size: clamp(2rem, 3vw, 2.75rem);
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 32px;
      font-size: 1.05rem;
      color: #4a5183;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 18px;
    }
    li {
      background: linear-gradient(135deg, rgba(83, 109, 254, 0.12), rgba(83, 109, 254, 0.02));
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    li:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(31, 37, 72, 0.12);
    }
    a {
      display: block;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
    }
    a span {
      display: block;
    }
    .title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 0.98rem;
      color: #555b8a;
    }
    footer {
      margin-top: 36px;
      font-size: 0.85rem;
      color: #7a80ad;
    }
    @media (max-width: 600px) {
      main {
        padding: 28px 24px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>YUHAN-GUO · GitHub Pages</h1>
    <p>欢迎访问我的 GitHub Pages 主页，下面列出了当前发布的项目：</p>
    <ul>
      <li>
        <a href="https://yuhan-guo.github.io/video-frame-capture/">
          <span class="title">视频浏览与帧截取工具</span>
          <span class="desc">上传本地视频，在线浏览并无损截取任意帧</span>
        </a>
      </li>
    </ul>
    <footer>如果你看到 404，请刷新页面或稍后再试。</footer>
  </main>
</body>
</html>
